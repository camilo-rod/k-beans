<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0d0d0d; overflow: hidden; font-family: 'DM Sans','Segoe UI',sans-serif; }
 
  #cam-wrapper {
    position: relative;
    width: 100%; height: 100%;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
 
  #video {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center center;
    display: block;
    transform-origin: center center;
    will-change: transform;
  }
  #canvas { display: none; }
 
  #cam-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    display: flex; align-items: center; gap: 10px; z-index: 10;
  }
  #cam-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #ff4444;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.3; transform:scale(0.65); }
  }
  #cam-label { color: rgba(255,255,255,0.8); font-size: 13px; letter-spacing: 0.05em; }
 
  #guide {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -56%);
    width: min(55vw, 240px); height: min(55vw, 240px);
    border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
    pointer-events: none; z-index: 10;
  }
  #guide::before, #guide::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.3);
  }
  #guide::before { top:50%; left:-12px; right:-12px; height:1px; }
  #guide::after  { left:50%; top:-12px; bottom:-12px; width:1px; }
 
  /* Zoom controls */
  #zoom-controls {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 15;
  }
  .zoom-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.2); border: none; cursor: pointer;
    color: white; font-size: 24px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: background 0.15s, transform 0.1s;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .zoom-btn:hover  { background: rgba(255,255,255,0.35); }
  .zoom-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.5); }
  #zoom-label {
    color: white; font-size: 12px; font-weight: 500;
    background: rgba(0,0,0,0.45); border-radius: 10px;
    padding: 3px 8px; min-width: 40px; text-align: center;
    backdrop-filter: blur(4px);
  }
 
  #cam-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 20px 28px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    display: flex; justify-content: center; align-items: center; gap: 32px; z-index: 10;
  }
 
  #btn-capture {
    width: 68px; height: 68px; border-radius: 50%;
    background: white; border: 4px solid rgba(255,255,255,0.45);
    cursor: pointer; outline: none;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.18);
    transition: transform 0.12s, box-shadow 0.12s; position: relative;
    touch-action: manipulation;
  }
  #btn-capture::after {
    content:''; position:absolute; inset:7px; border-radius:50%;
    background:white; border:2px solid #bbb;
  }
  #btn-capture:hover  { transform:scale(1.08); box-shadow:0 0 0 8px rgba(255,255,255,0.15); }
  #btn-capture:active { transform:scale(0.91); }
 
  #btn-flip {
    width:46px; height:46px; border-radius:50%;
    background:rgba(255,255,255,0.15); border:none; cursor:pointer;
    color:white; font-size:20px;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.15s; backdrop-filter:blur(4px);
    touch-action: manipulation;
  }
  #btn-flip:hover { background:rgba(255,255,255,0.28); }
 
  #flash {
    position:absolute; inset:0; background:white; opacity:0;
    pointer-events:none; z-index:20;
  }
  #flash.snap { animation: flashAnim 0.3s ease-out forwards; }
  @keyframes flashAnim { 0%{opacity:0.9} 100%{opacity:0} }
 
  #thumb {
    position:absolute; bottom:110px; right:16px;
    width:72px; height:72px; border-radius:10px;
    border:2px solid rgba(255,255,255,0.5);
    object-fit:cover; display:none; z-index:15;
    box-shadow:0 4px 14px rgba(0,0,0,0.5);
  }
  #badge {
    position:absolute; bottom:110px; left:50%; transform:translateX(-50%);
    background:rgba(40,160,80,0.9); color:white; font-size:12px;
    padding:6px 14px; border-radius:20px; display:none; z-index:15;
    white-space:nowrap; backdrop-filter:blur(4px);
  }
  #no-cam {
    display:none; position:absolute; inset:0;
    align-items:center; justify-content:center; flex-direction:column; gap:12px;
    background:#111; color:#aaa; font-size:14px; text-align:center; padding:30px; z-index:50;
  }
  #no-cam.show { display:flex; }
</style>
</head>
<body>
 
<div id="cam-wrapper">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
 
  <div id="cam-top">
    <div id="cam-dot"></div>
    <span id="cam-label">Centra el frijol en el círculo y captura</span>
  </div>
 
  <div id="guide"></div>
 
  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-zoom-in">+</button>
    <span id="zoom-label">1×</span>
    <button class="zoom-btn" id="btn-zoom-out">−</button>
  </div>
 
  <div id="cam-bottom">
    <button id="btn-flip" title="Cambiar cámara">🔄</button>
    <button id="btn-capture" title="Tomar foto"></button>
    <div style="width:46px"></div>
  </div>
 
  <div id="flash"></div>
  <img id="thumb" alt="preview" />
  <div id="badge">✅ Foto enviada — procesando…</div>
</div>
 
<div id="no-cam">
  <p style="font-size:32px">📷</p>
  <p>No se pudo acceder a la cámara.</p>
  <p style="font-size:12px;color:#666;margin-top:4px">
    Verifica permisos del navegador.<br>
    La app debe correr en HTTPS o localhost.
  </p>
</div>
 
<script>
(function () {
  const video      = document.getElementById('video');
  const canvas     = document.getElementById('canvas');
  const btnCap     = document.getElementById('btn-capture');
  const btnFl      = document.getElementById('btn-flip');
  const btnZoomIn  = document.getElementById('btn-zoom-in');
  const btnZoomOut = document.getElementById('btn-zoom-out');
  const zoomLabel  = document.getElementById('zoom-label');
  const flash      = document.getElementById('flash');
  const thumb      = document.getElementById('thumb');
  const badge      = document.getElementById('badge');
  const noCam      = document.getElementById('no-cam');
 
  let stream   = null;
  let useFront = false;
 
  /* ── Streamlit handshake ─────────────────────────────── */
  function stSend(type, payload) {
    window.parent.postMessage(Object.assign({ type }, payload), '*');
  }
 
  function reportHeight() {
    // Usar document.body.scrollHeight para no depender de vh dentro del iframe
    var h = document.documentElement.scrollHeight || document.body.scrollHeight || 520;
    stSend('streamlit:setFrameHeight', { height: h });
  }
 
  // Anunciar ready INMEDIATAMENTE — no esperar a nada
  stSend('streamlit:componentReady', { apiVersion: 1 });
  reportHeight();
 
  // Reenviar cuando Streamlit mande render (por si llega tarde)
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'streamlit:render') {
      stSend('streamlit:componentReady', { apiVersion: 1 });
      reportHeight();
    }
  });
 
  window.addEventListener('resize', reportHeight);
 
  function sendPhoto(b64) {
    stSend('streamlit:setComponentValue', { value: b64, dataType: 'json' });
  }
 
  /* ── Zoom ────────────────────────────────────────────── */
  let zoomLevel  = 1.0;
  const ZOOM_MIN  = 1.0;
  const ZOOM_MAX  = 8.0;
  const ZOOM_STEP = 0.25;
 
  function applyZoom(z) {
    zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z));
    video.style.transform = 'scale(' + zoomLevel + ')';
    var label = zoomLevel % 1 === 0 ? zoomLevel + '×' : zoomLevel.toFixed(2) + '×';
    zoomLabel.textContent = label;
 
    // Zoom nativo de hardware si el browser/dispositivo lo soporta
    if (stream) {
      var track = stream.getVideoTracks()[0];
      if (track && track.getCapabilities) {
        var caps = track.getCapabilities();
        if (caps.zoom) {
          var hwZ = caps.zoom.min + ((zoomLevel - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN)) * (caps.zoom.max - caps.zoom.min);
          track.applyConstraints({ advanced: [{ zoom: hwZ }] }).catch(function(){});
        }
      }
    }
  }
 
  btnZoomIn.addEventListener('click',  function() { applyZoom(zoomLevel + ZOOM_STEP); });
  btnZoomOut.addEventListener('click', function() { applyZoom(zoomLevel - ZOOM_STEP); });
 
  // Scroll en desktop
  document.getElementById('cam-wrapper').addEventListener('wheel', function(e) {
    e.preventDefault();
    applyZoom(zoomLevel + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
  }, { passive: false });
 
  // Pinch en móvil
  var pinchStartDist = null;
  var pinchStartZoom = 1.0;
 
  function getTouchDist(e) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
 
  video.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      pinchStartDist = getTouchDist(e);
      pinchStartZoom = zoomLevel;
    }
  }, { passive: true });
 
  video.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && pinchStartDist) {
      applyZoom(pinchStartZoom * (getTouchDist(e) / pinchStartDist));
    }
  }, { passive: true });
 
  video.addEventListener('touchend', function() { pinchStartDist = null; });
 
  /* ── Cámara ──────────────────────────────────────────── */
  function startCamera() {
    if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
    zoomLevel = 1.0;
    video.style.transform = 'scale(1)';
    zoomLabel.textContent = '1×';
 
    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: useFront ? 'user' : 'environment',
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      },
      audio: false
    }).then(function(s) {
      stream = s;
      video.srcObject = s;
      video.play();
    }).catch(function() {
      document.getElementById('cam-wrapper').style.display = 'none';
      noCam.classList.add('show');
    });
  }
 
  /* ── Captura ─────────────────────────────────────────── */
  btnCap.addEventListener('click', function() {
    if (!stream) return;
 
    flash.classList.remove('snap');
    void flash.offsetWidth;
    flash.classList.add('snap');
 
    var vw = video.videoWidth  || 1280;
    var vh = video.videoHeight || 720;
    canvas.width  = vw;
    canvas.height = vh;
 
    // Aplicar zoom al recorte: el canvas captura lo que se ve en pantalla
    var ctx = canvas.getContext('2d');
    ctx.save();
    var cx = vw / 2, cy = vh / 2;
    ctx.translate(cx, cy);
    ctx.scale(zoomLevel, zoomLevel);
    ctx.translate(-cx, -cy);
    ctx.drawImage(video, 0, 0, vw, vh);
    ctx.restore();
 
    var dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    var b64     = dataUrl.split(',')[1];
 
    thumb.src           = dataUrl;
    thumb.style.display = 'block';
    badge.style.display = 'block';
    setTimeout(function() { badge.style.display = 'none'; }, 3000);
 
    sendPhoto(b64);
  });
 
  btnFl.addEventListener('click', function() { useFront = !useFront; startCamera(); });
 
  /* ── Init ────────────────────────────────────────────── */
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    startCamera();
  } else {
    document.getElementById('cam-wrapper').style.display = 'none';
    noCam.classList.add('show');
  }
 
})();
</script>
</body>
</html>
